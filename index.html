<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monumenti di Roma</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        #map { height: 400px; }
    </style>
</head>
<body>

    <h1 id="titolo-principale">MONUMENTI DI ROMA</h1>
    
    <div id="map"></div>

    <a id="link-wiki" href="https://it.wikipedia.org/wiki/Roma" target="_blank">Scopri Roma su Wikipedia</a>

    <div id="form-container">
        <h3>Aggiungi un nuovo monumento</h3>
        <form id="monumento-form">
            <input type="text" id="nome-monumento" placeholder="Nome del monumento" required>
            <input type="number" id="lat-monumento" placeholder="Latitudine" step="any" required>
            <input type="number" id="lng-monumento" placeholder="Longitudine" step="any" required>
            <button type="submit">Aggiungi monumento</button>
        </form>
    </div>

    <button id="btn-statistiche">Mostra statistiche monumenti</button>

    <button id="btn-tabella">Mostra tabella monumenti</button>
    
    <div id="tabella-container"></div>
    
    <script src="monumenti.js"></script>
    <script src="script.js"></script>
</body>
</html>
